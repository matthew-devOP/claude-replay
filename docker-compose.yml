services:
  claude-replay:
    build: .
    ports:
      - "7331:7331"
    volumes:
      # Session data (required)
      - ${HOME}/.claude:${HOME}/.claude:ro
      - ${HOME}/.claude-work:${HOME}/.claude-work:ro
      - ${HOME}/.claude-outlook:${HOME}/.claude-outlook:ro
      - ${HOME}/.claude-yahoo:${HOME}/.claude-yahoo:ro
      - ${HOME}/.cursor:${HOME}/.cursor:ro
      - ${HOME}/.codex:${HOME}/.codex:ro
      # Project dirs (rw needed for lazygit to commit/push)
      - ${HOME}:${HOME}
      # Dev mode: mount source code for live reload (no rebuild needed)
      - ./src:/app/src:ro
      - ./template:/app/template:ro
      - ./bin:/app/bin:ro
      - ./package.json:/app/package.json:ro
    environment:
      - HOME=${HOME}
      - CLAUDE_REPLAY_DATA=/app/data
