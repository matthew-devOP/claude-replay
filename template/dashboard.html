<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%23bb9af7' stroke-width='2'/><polygon points='12,8 12,24 24,16' fill='%23bb9af7'/></svg>">
<title>claude-replay</title>
<style>/*SHARED_CSS*/</style>
<style>
/* Dashboard-specific styles */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}
.app-header { grid-column: 1 / -1; }
.app-footer { grid-column: 1 / -1; }

/* Sidebar */
.sidebar {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--bg);
}
.sidebar-section { padding: 16px; }
.sidebar-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 10px;
}
.project-card {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.project-card:hover { background: var(--bg-hover); }
.project-card.active { background: var(--bg-surface); border: 1px solid var(--border); }
.project-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 2px;
  word-break: break-word;
}
.project-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 10px;
}

/* Main content */
.main { overflow-y: auto; padding: 24px 32px; }

/* Welcome */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  height: 100%;
  color: var(--text-dim);
  text-align: center;
}
.welcome h2 { color: var(--text); font-size: 20px; }
.welcome p { max-width: 400px; font-size: 14px; line-height: 1.6; }

/* Detail header */
.detail-header { margin-bottom: 24px; }
.detail-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 4px;
  word-break: break-word;
}
.detail-path {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
.detail-stats-row {
  display: flex;
  gap: 16px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.detail-stat {
  display: flex;
  align-items: center;
  gap: 4px;
}
.detail-stat strong { color: var(--text); }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Markdown display */
.md-display {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  font-size: 13px;
  line-height: 1.7;
  max-height: 500px;
  overflow-y: auto;
  white-space: pre-wrap;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  color: var(--text);
}
.md-empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 20px;
  text-align: center;
}

/* Session table */
.session-table-wrap { overflow-x: auto; max-width: 100%; }
.session-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
.session-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 700;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
}
.session-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.session-table tr:hover td { background: var(--bg-surface); }
.session-id {
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--cyan);
}
.session-preview {
  color: var(--text);
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-date { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.session-turns { font-size: 12px; color: var(--text-dim); text-align: center; }
.session-size { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.session-actions { display: flex; gap: 6px; white-space: nowrap; }

/* Stats panel */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stats-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.stats-card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stats-card-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
}
.stats-card-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.stats-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
}

/* Git info in sidebar */
.project-git-info {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
  font-size: 10px;
  flex-wrap: wrap;
}
.git-badge {
  color: var(--cyan);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 10px;
  font-weight: 600;
}
.git-branches { color: var(--text-dim); }
.git-dirty { color: var(--orange); font-size: 8px; }

/* Git status in detail header */
.detail-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: space-between;
}
.detail-actions { display: flex; gap: 6px; flex-shrink: 0; }
.detail-git-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.git-remote-badge {
  font-size: 11px;
  color: var(--blue);
}
.git-no-remote {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
}
.git-dirty-badge {
  font-size: 11px;
  color: var(--orange);
  font-weight: 600;
}
.git-clean-badge {
  font-size: 11px;
  color: var(--green);
}

/* Git tab */
.git-hash {
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--orange);
  margin-right: 6px;
}
.git-graph-pre {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--text);
  overflow-x: auto;
  max-height: 500px;
  overflow-y: auto;
  white-space: pre;
  margin-top: 8px;
}

/* Stats detail sections */
.stats-detail { margin-bottom: 8px; }
.stats-detail-list { margin-top: 8px; }
.stats-detail-item {
  padding: 8px 12px;
  border-left: 3px solid var(--border);
  margin-bottom: 4px;
  font-size: 12px;
  background: var(--bg-surface);
  border-radius: 0 4px 4px 0;
}
.stats-detail-item code {
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--cyan);
  word-break: break-all;
}
.stats-detail-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-left: 8px;
}
.stats-detail-item-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.stats-detail-prompt {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-dim);
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 4px;
  border: 1px solid var(--border);
  word-break: break-word;
}
.btn-copy {
  cursor: pointer;
  min-width: 28px;
  font-size: 11px;
}
.stats-agent-badge {
  font-size: 10px;
  background: var(--bg-hover);
  color: var(--text-dim);
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

/* Plan cards */
.plan-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.plan-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.plan-card-path { font-size: 11px; color: var(--text-dim); }

/* Sortable table headers */
.session-table th.sortable {
  cursor: pointer;
  user-select: none;
}
.session-table th.sortable:hover { color: var(--text); }
.session-table th.sortable .sort-arrow {
  font-size: 9px;
  margin-left: 3px;
  opacity: 0.3;
}
.session-table th.sortable.sort-active .sort-arrow { opacity: 1; color: var(--accent); }

/* Transcript viewer overlay */
.transcript-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: var(--bg);
  flex-direction: column;
}
.transcript-overlay.open { display: flex; }

/* Transcript header */
.transcript-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 48px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.transcript-header-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}
.transcript-header-meta {
  font-size: 11px;
  color: var(--text-dim);
}
.transcript-header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.transcript-close {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 5px 14px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.15s;
}
.transcript-close:hover { border-color: var(--accent); color: var(--accent); }

/* Search bar */
.transcript-search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.transcript-search-input {
  flex: 1;
  max-width: 400px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 12px;
  font-size: 13px;
  font-family: inherit;
}
.transcript-search-input:focus { outline: none; border-color: var(--accent); }
.transcript-search-count {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 70px;
  font-variant-numeric: tabular-nums;
}
.transcript-search-nav {
  display: flex;
  gap: 4px;
}
.transcript-search-nav button {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.transcript-search-nav button:hover { border-color: var(--accent); color: var(--accent); }
.transcript-search-nav button:disabled { opacity: 0.3; cursor: default; }

/* Filter toggles */
.transcript-filters {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 16px;
  border-left: 1px solid var(--border);
  padding-left: 16px;
}
.transcript-filter-btn {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.transcript-filter-btn:hover { color: var(--text); border-color: var(--text-dim); }
.transcript-filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(187,154,247,0.08); }

/* Transcript body */
.transcript-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 60px;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}
.transcript-turn {
  margin-bottom: 24px;
}
.transcript-turn-header {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.transcript-turn-num {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--text);
}
.transcript-user {
  background: var(--bg-surface);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 8px;
  border-left: 3px solid var(--accent);
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13px;
  color: var(--text-bright);
  line-height: 1.6;
}
.transcript-role-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.transcript-role-label.user { color: var(--accent); }
.transcript-role-label.assistant { color: var(--cyan); }
.transcript-assistant {
  padding: 8px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13px;
  color: var(--text);
  line-height: 1.7;
  border-left: 3px solid var(--cyan);
  margin-bottom: 4px;
}
.transcript-tool {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  margin: 6px 0;
  font-size: 11px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  overflow-x: auto;
}
.transcript-tool-name {
  color: var(--cyan);
  font-weight: 600;
  margin-right: 6px;
}
.transcript-tool-preview {
  color: var(--text-dim);
  word-break: break-all;
}
.transcript-tool code.transcript-tool-preview {
  color: var(--text);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 3px;
  display: block;
  margin-top: 4px;
  white-space: pre-wrap;
}
.transcript-tool-result {
  margin-top: 6px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 4px;
  font-size: 10px;
  color: var(--green);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 150px;
  overflow-y: auto;
}
.transcript-tool-prompt {
  margin-top: 4px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 4px;
  font-size: 10px;
  color: var(--text-dim);
  white-space: pre-wrap;
  max-height: 120px;
  overflow-y: auto;
}
.transcript-thinking {
  border-left: 2px solid var(--text-dim);
  padding: 6px 12px;
  color: var(--text-dim);
  font-size: 11px;
  margin: 6px 0;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
  background: var(--bg-surface);
  border-radius: 0 6px 6px 0;
}
.transcript-system-event {
  font-size: 11px;
  color: var(--text-dim);
  padding: 4px 12px;
  border-left: 2px solid var(--orange);
  margin: 4px 0;
}

/* Search highlights */
mark.search-highlight {
  background: rgba(255, 158, 100, 0.3);
  color: inherit;
  border-radius: 2px;
  padding: 1px 2px;
  border-bottom: 2px solid var(--orange);
}
mark.search-highlight.active {
  background: var(--accent);
  color: #fff;
  border-bottom-color: var(--accent);
  border-radius: 3px;
  outline: 2px solid rgba(187,154,247,0.4);
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>
<script>
  // Apply saved theme immediately to prevent flash
  try {
    const saved = localStorage.getItem("claude-replay-theme");
    if (saved) {
      const data = JSON.parse('/*THEMES_JSON*/');
      const vars = data.themes[saved];
      if (vars) {
        for (const [k, v] of Object.entries(vars)) {
          document.documentElement.style.setProperty("--" + k, v);
        }
      }
    }
  } catch {}
</script>
<div class="app">
  <header class="app-header">
    <a href="/" class="app-logo">
      <svg width="22" height="22" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)"/><polygon points="12,8 12,24 24,16" fill="currentColor" style="color:var(--accent)"/></svg>
      claude-replay
      <span class="app-version" id="appVersion"></span>
    </a>
    <nav class="app-nav">
      <a href="/" class="active">Projects</a>
      <a href="/editor">Editor</a>
    </nav>
    <div class="app-header-right">
      <div class="theme-dropdown" id="themeDropdown">
        <button class="theme-dropdown-btn" id="themeDropdownBtn">
          <span class="theme-dot-mini" id="themeDotPreview"></span>
          <span id="themeNameLabel">Theme</span>
          <span class="theme-dropdown-arrow">\u25BC</span>
        </button>
        <div class="theme-dropdown-menu" id="themeDropdownMenu"></div>
      </div>
      <button class="btn-icon" id="helpBtn" title="Keyboard shortcuts (?)">?</button>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Projects</div>
      <div id="project-list"><div class="loading"><div class="spinner"></div> Loading...</div></div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <svg width="48" height="48" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--accent)"/><polygon points="12,8 12,24 24,16" fill="currentColor" style="color:var(--accent)"/></svg>
      <h2>Welcome to claude-replay</h2>
      <p>Select a project from the sidebar to browse sessions, view CLAUDE.md, and export conversations.</p>
    </div>
    <div id="detail" style="display:none"></div>
  </div>

  <footer class="app-footer">
    <div class="footer-left" id="footerLeft"></div>
    <div class="footer-right" id="footerRight"></div>
  </footer>
</div>

<!-- Transcript viewer -->
<div class="transcript-overlay" id="transcriptOverlay">
  <div class="transcript-header">
    <span class="transcript-header-title" id="transcriptTitle">Transcript</span>
    <span class="transcript-header-meta" id="transcriptMeta"></span>
    <div class="transcript-header-right">
      <button class="transcript-close" id="transcriptClose">Close <kbd style="font-size:10px;opacity:0.5;margin-left:4px">Esc</kbd></button>
    </div>
  </div>
  <div class="transcript-search-bar">
    <input type="text" class="transcript-search-input" id="transcriptSearch" placeholder="Search in conversation... (Enter = next, Shift+Enter = prev)">
    <span class="transcript-search-count" id="transcriptSearchCount"></span>
    <div class="transcript-search-nav">
      <button id="searchPrev" title="Previous (Shift+Enter)">&larr;</button>
      <button id="searchNext" title="Next (Enter)">&rarr;</button>
    </div>
    <div class="transcript-filters">
      <button class="transcript-filter-btn active" data-filter="user" id="filterUser">User</button>
      <button class="transcript-filter-btn active" data-filter="assistant" id="filterAssistant">Assistant</button>
      <button class="transcript-filter-btn active" data-filter="tools" id="filterTools">Tools</button>
      <button class="transcript-filter-btn active" data-filter="thinking" id="filterThinking">Thinking</button>
    </div>
  </div>
  <div class="transcript-body" id="transcriptBody"></div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Help modal -->
<div class="modal-overlay" id="helpModal">
  <div class="modal">
    <h2>Keyboard Shortcuts</h2>
    <div class="modal-shortcuts">
      <kbd>?</kbd> <span>Toggle this help</span>
      <kbd>1</kbd> <span>Go to Projects</span>
      <kbd>2</kbd> <span>Go to Editor</span>
      <kbd>Esc</kbd> <span>Close modal</span>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  const THEME_DATA = JSON.parse('/*THEMES_JSON*/');
  const projectListEl = document.getElementById("project-list");
  const welcomeEl = document.getElementById("welcome");
  const detailEl = document.getElementById("detail");
  const footerLeft = document.getElementById("footerLeft");
  const footerRight = document.getElementById("footerRight");
  const toastContainer = document.getElementById("toastContainer");
  const helpModal = document.getElementById("helpModal");

  let projects = [];
  let activeProject = null;
  let activeDetails = null;

  // ─── Theme Switcher ───

  let currentTheme = localStorage.getItem("claude-replay-theme") || "tokyo-night";

  function applyTheme(name) {
    const vars = THEME_DATA.themes[name];
    if (!vars) return;
    currentTheme = name;
    document.body.classList.add("theme-transitioning");
    for (const [k, v] of Object.entries(vars)) {
      document.documentElement.style.setProperty("--" + k, v);
    }
    localStorage.setItem("claude-replay-theme", name);
    document.querySelectorAll(".theme-dropdown-item").forEach(d =>
      d.classList.toggle("active", d.dataset.theme === name)
    );
    document.getElementById("themeDotPreview").style.background = vars.accent;
    document.getElementById("themeNameLabel").textContent = name;
    requestAnimationFrame(() => {
      setTimeout(() => document.body.classList.remove("theme-transitioning"), 350);
    });
  }

  function initThemeSwitcher() {
    const menu = document.getElementById("themeDropdownMenu");
    const btn = document.getElementById("themeDropdownBtn");
    const dropdown = document.getElementById("themeDropdown");

    for (const [name, vars] of Object.entries(THEME_DATA.themes)) {
      const item = document.createElement("button");
      item.className = "theme-dropdown-item" + (name === currentTheme ? " active" : "");
      item.dataset.theme = name;
      item.innerHTML = '<span class="theme-dot-mini" style="background:' + vars.accent + '"></span>' + name;
      item.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.classList.remove("open");
        applyTheme(name);
      });
      menu.appendChild(item);
    }

    const initVars = THEME_DATA.themes[currentTheme];
    if (initVars) {
      document.getElementById("themeDotPreview").style.background = initVars.accent;
      document.getElementById("themeNameLabel").textContent = currentTheme;
    }

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("open");
    });
    document.addEventListener("click", () => dropdown.classList.remove("open"));
  }

  // ─── Toast ───

  function toast(message, type = "success") {
    const el = document.createElement("div");
    el.className = `toast toast-${type}`;
    el.textContent = message;
    toastContainer.appendChild(el);
    setTimeout(() => {
      el.classList.add("toast-out");
      setTimeout(() => el.remove(), 300);
    }, 3000);
  }

  // ─── Helpers ───

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return "\u2014";
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return "just now";
    if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
    if (diff < 604800000) return Math.floor(diff / 86400000) + "d ago";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: d.getFullYear() !== now.getFullYear() ? "numeric" : undefined });
  }

  function formatFullDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });
  }

  function formatSize(bytes) {
    if (!bytes) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  function formatDuration(ms) {
    if (!ms || ms <= 0) return "\u2014";
    const sec = Math.round(ms / 1000);
    if (sec < 60) return sec + "s";
    const min = Math.floor(sec / 60);
    if (min < 60) return min + "m " + (sec % 60) + "s";
    const hr = Math.floor(min / 60);
    return hr + "h " + (min % 60) + "m";
  }

  async function api(path, body) {
    const opts = body ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) } : {};
    const res = await fetch(path, opts);
    return res.json();
  }

  // ─── Footer ───

  function updateFooter() {
    if (activeDetails) {
      footerLeft.textContent = `${activeDetails.stats.totalSessions} sessions \u00B7 ${activeDetails.stats.totalTurns} turns \u00B7 ${formatSize(activeDetails.stats.totalSize)}`;
    } else if (projects.length > 0) {
      const totalSessions = projects.reduce((s, p) => s + p.sessionCount, 0);
      footerLeft.textContent = `${projects.length} projects \u00B7 ${totalSessions} sessions`;
    }
    footerRight.textContent = `claude-replay v${THEME_DATA.version}`;
  }

  // ─── Project list ───

  async function loadProjects() {
    projects = await api("/api/projects");
    document.getElementById("appVersion").textContent = "v" + THEME_DATA.version;
    renderProjectList();
    updateFooter();
  }

  function renderProjectList() {
    if (projects.length === 0) {
      projectListEl.innerHTML = '<div class="md-empty">No projects found.</div>';
      return;
    }
    projectListEl.innerHTML = projects.map((p, i) => `
      <div class="project-card" data-idx="${i}">
        <div class="project-name">${escapeHtml(p.name)}</div>
        <div class="project-meta">
          <span>${p.sessionCount} session${p.sessionCount !== 1 ? "s" : ""}</span>
          <span>${formatDate(p.lastActivity)}</span>
        </div>
        <div class="project-git-info" id="gitInfo${i}"></div>
      </div>
    `).join("");

    projectListEl.addEventListener("click", (e) => {
      const card = e.target.closest(".project-card");
      if (!card) return;
      const idx = parseInt(card.dataset.idx);
      selectProject(projects[idx]);
      for (const c of projectListEl.querySelectorAll(".project-card")) c.classList.remove("active");
      card.classList.add("active");
    });

    // Load git info async for each project
    projects.forEach(async (p, i) => {
      const el = document.getElementById("gitInfo" + i);
      if (!el) return;
      try {
        const git = await api("/api/git-info", { path: p.path });
        p._git = git;
        if (git && git.isRepo) {
          el.innerHTML = `<span class="git-badge">\u2387 ${escapeHtml(git.branch)}</span>` +
            (git.localBranchCount > 1 ? `<span class="git-branches">${git.localBranchCount} branches</span>` : "") +
            (git.status && !git.status.clean ? `<span class="git-dirty">\u25CF</span>` : "");
        }
      } catch { /* ignore */ }
    });
  }

  // ─── Project detail ───

  async function selectProject(project) {
    activeProject = project;
    welcomeEl.style.display = "none";
    detailEl.style.display = "block";
    detailEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';

    const [details, gitInfo] = await Promise.all([
      api("/api/projects/details", { source: project.source, dirName: project.dirName }),
      api("/api/git-info", { path: project.path }).catch(() => ({ isRepo: false })),
    ]);
    activeDetails = details;
    updateFooter();

    const stats = details.stats;

    // Git status badge
    let gitBadge = "";
    if (gitInfo && gitInfo.isRepo) {
      const statusParts = [];
      if (gitInfo.status && !gitInfo.status.clean) {
        if (gitInfo.status.modified) statusParts.push(gitInfo.status.modified + " modified");
        if (gitInfo.status.added) statusParts.push(gitInfo.status.added + " new");
        if (gitInfo.status.deleted) statusParts.push(gitInfo.status.deleted + " deleted");
      }
      gitBadge = `<div class="detail-git-row">
        <span class="git-badge">\u2387 ${escapeHtml(gitInfo.branch)}</span>
        <span class="git-branches">${gitInfo.localBranchCount} branch${gitInfo.localBranchCount !== 1 ? "es" : ""}</span>
        ${gitInfo.hasRemote ? '<span class="git-remote-badge">\u2601 ' + escapeHtml(gitInfo.remotes[0].name) + '</span>' : '<span class="git-no-remote">no remote</span>'}
        ${!gitInfo.status?.clean ? '<span class="git-dirty-badge">' + statusParts.join(", ") + '</span>' : '<span class="git-clean-badge">\u2713 clean</span>'}
      </div>`;
    }

    let html = `
      <div class="detail-header">
        <div class="detail-title-row">
          <div class="detail-title">${escapeHtml(details.name)}</div>
          <div class="detail-actions">
            <button class="btn btn-small" id="openFinderBtn" title="Open in Finder">\uD83D\uDCC1 Finder</button>
            <button class="btn btn-small" id="openTermBtn" title="Open in Terminal">\uD83D\uDCBB Terminal</button>
          </div>
        </div>
        <div class="detail-path">${escapeHtml(details.claudeProjectPath)}</div>
        ${gitBadge}
        <div class="detail-stats-row">
          <div class="detail-stat"><strong>${stats.totalSessions}</strong> sessions</div>
          <div class="detail-stat"><strong>${stats.totalTurns}</strong> turns</div>
          <div class="detail-stat"><strong>${formatSize(stats.totalSize)}</strong></div>
          ${stats.dateRange ? `<div class="detail-stat">${formatDate(stats.dateRange.first)} \u2192 ${formatDate(stats.dateRange.last)}</div>` : ""}
        </div>
      </div>
      <div class="tabs" id="tabs">
        <div class="tab active" data-tab="sessions">Sessions (${details.sessions.length})</div>
        <div class="tab" data-tab="stats">Stats</div>
        <div class="tab" data-tab="plans">Plans</div>
        ${gitInfo && gitInfo.isRepo ? '<div class="tab" data-tab="git">Git</div>' : ""}
        ${details.claudeMd ? '<div class="tab" data-tab="claude-md">CLAUDE.md</div>' : ""}
        ${details.memoryMd ? '<div class="tab" data-tab="memory-md">MEMORY.md</div>' : ""}
      </div>
      <div class="tab-content active" id="tab-sessions">${renderSessionTable(details.sessions)}</div>
      <div class="tab-content" id="tab-stats"><div class="loading"><div class="spinner"></div> Click to load stats...</div></div>
      <div class="tab-content" id="tab-plans"><div class="loading"><div class="spinner"></div> Click to load plans...</div></div>
      ${gitInfo && gitInfo.isRepo ? '<div class="tab-content" id="tab-git"><div class="loading"><div class="spinner"></div> Click to load git details...</div></div>' : ""}
    `;

    if (details.claudeMd) {
      html += `<div class="tab-content" id="tab-claude-md"><div class="md-display">${escapeHtml(details.claudeMd)}</div></div>`;
    }
    if (details.memoryMd) {
      html += `<div class="tab-content" id="tab-memory-md"><div class="md-display">${escapeHtml(details.memoryMd)}</div></div>`;
    }

    detailEl.innerHTML = html;

    // Tab switching
    let statsLoaded = false;
    let plansLoaded = false;
    let gitLoaded = false;
    const tabs = detailEl.querySelectorAll(".tab");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        detailEl.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        tab.classList.add("active");
        const target = document.getElementById("tab-" + tab.dataset.tab);
        if (target) target.classList.add("active");
        if (tab.dataset.tab === "stats" && !statsLoaded) {
          statsLoaded = true;
          loadProjectStats(details.sessions);
        }
        if (tab.dataset.tab === "plans" && !plansLoaded) {
          plansLoaded = true;
          loadProjectPlans(details.sessions);
        }
        if (tab.dataset.tab === "git" && !gitLoaded) {
          gitLoaded = true;
          loadGitTab(project.path);
        }
      });
    });

    // Open in Finder / Terminal
    const finderBtn = document.getElementById("openFinderBtn");
    const termBtn = document.getElementById("openTermBtn");
    if (finderBtn) finderBtn.addEventListener("click", () => {
      api("/api/open", { path: project.path, action: "finder" });
      toast("Opened in Finder");
    });
    if (termBtn) termBtn.addEventListener("click", () => {
      api("/api/open", { path: project.path, action: "terminal" });
      toast("Opened in Terminal");
    });

    wireSessionActions(details.sessions);
  }

  // Copy to clipboard helper
  function copyBtn(text, label) {
    return `<button class="btn btn-small btn-copy" data-copy="${escapeHtml(text)}" title="Copy to clipboard">${label || '\uD83D\uDCCB'}</button>`;
  }

  // Delegated click handler for copy buttons
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".btn-copy");
    if (!btn) return;
    const text = btn.dataset.copy;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "\u2713";
      setTimeout(() => { btn.textContent = "\uD83D\uDCCB"; }, 1500);
    }).catch(() => toast("Copy failed", "error"));
  });

  async function loadProjectStats(sessions) {
    const statsEl = document.getElementById("tab-stats");
    statsEl.innerHTML = '<div class="loading"><div class="spinner"></div> Computing stats...</div>';

    const toLoad = sessions.slice(0, 20);
    const results = await Promise.all(toLoad.map((s, i) =>
      api("/api/session-stats", { path: s.path }).then(r => ({ ...r, _session: s, _idx: i })).catch(() => null)
    ));

    // Aggregate
    const toolTotals = {};
    let totalDuration = 0, totalThinkingChars = 0, totalAssistantChars = 0, totalUserChars = 0, totalErrors = 0;
    const allBashCmds = [], allAgents = [], allTeams = [], allUserMsgs = [], allAssistantTexts = [];
    const allFilesRead = {}, allFilesEdited = {};

    for (const r of results) {
      if (!r) continue;
      const sid = r._session.sessionId.slice(0, 8);
      if (r.duration) totalDuration += r.duration;
      totalThinkingChars += r.thinkingCharacters || 0;
      totalAssistantChars += r.assistantCharacters || 0;
      totalUserChars += r.userCharacters || 0;
      totalErrors += r.errorCount || 0;
      for (const [tool, count] of Object.entries(r.toolBreakdown || {})) {
        toolTotals[tool] = (toolTotals[tool] || 0) + count;
      }
      for (const cmd of r.bashCommands || []) allBashCmds.push({ ...cmd, session: sid });
      for (const f of r.filesRead || []) allFilesRead[f.path] = (allFilesRead[f.path] || 0) + 1;
      for (const f of r.filesEdited || []) allFilesEdited[f.path] = { count: (allFilesEdited[f.path]?.count || 0) + 1, tool: f.tool };
      for (const a of r.agents || []) allAgents.push({ ...a, session: sid });
      for (const t of r.teams || []) allTeams.push({ ...t, session: sid });
      for (const m of r.userMessages || []) allUserMsgs.push({ ...m, session: sid });
      for (const t of r.assistantTexts || []) allAssistantTexts.push({ ...t, session: sid });
    }

    const sortedTools = Object.entries(toolTotals).sort((a, b) => b[1] - a[1]);
    const maxToolCount = sortedTools.length > 0 ? sortedTools[0][1] : 1;

    let html = `<div class="stats-grid">
      <div class="stats-card"><div class="stats-card-label">Total Duration</div><div class="stats-card-value">${formatDuration(totalDuration)}</div><div class="stats-card-sub">across ${toLoad.length} sessions</div></div>
      <div class="stats-card"><div class="stats-card-label">Tool Calls</div><div class="stats-card-value">${Object.values(toolTotals).reduce((s, v) => s + v, 0)}</div><div class="stats-card-sub">${totalErrors > 0 ? totalErrors + " errors" : "no errors"}</div></div>
      <div class="stats-card"><div class="stats-card-label">User Input</div><div class="stats-card-value">${formatSize(totalUserChars)}</div><div class="stats-card-sub">${allUserMsgs.length} messages</div></div>
      <div class="stats-card"><div class="stats-card-label">Assistant Output</div><div class="stats-card-value">${formatSize(totalAssistantChars)}</div><div class="stats-card-sub">${formatSize(totalThinkingChars)} thinking</div></div>
    </div>`;

    // Tool usage bars
    if (sortedTools.length > 0) {
      html += '<div class="stats-section-title">Tool Usage</div>';
      for (const [tool, count] of sortedTools) {
        const pct = Math.max(2, (count / maxToolCount) * 100);
        html += `<div class="stat-bar-row"><span class="stat-bar-label">${escapeHtml(tool)}</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div><span class="stat-bar-value">${count}</span></div>`;
      }
    }

    // User Messages
    if (allUserMsgs.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">User Input (' + allUserMsgs.length + ' messages)</summary><div class="stats-detail-list">';
      for (const m of allUserMsgs) {
        html += `<div class="stats-detail-item"><div class="stats-detail-item-header"><span class="stats-detail-meta">turn ${m.turn} \u00B7 ${m.session}</span>${copyBtn(m.text)}</div><div class="stats-detail-prompt">${escapeHtml(m.text)}</div></div>`;
      }
      html += '</div></details>';
    }

    // Assistant Output
    if (allAssistantTexts.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Assistant Output (' + allAssistantTexts.length + ' blocks)</summary><div class="stats-detail-list">';
      for (const t of allAssistantTexts.slice(0, 100)) {
        html += `<div class="stats-detail-item"><div class="stats-detail-item-header"><span class="stats-detail-meta">turn ${t.turn} \u00B7 ${t.session}</span>${copyBtn(t.text)}</div><div class="stats-detail-prompt">${escapeHtml(t.text.length > 1000 ? t.text.slice(0, 1000) + '...' : t.text)}</div></div>`;
      }
      if (allAssistantTexts.length > 100) html += '<div class="md-empty">...and ' + (allAssistantTexts.length - 100) + ' more</div>';
      html += '</div></details>';
    }

    // Bash commands
    if (allBashCmds.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Bash Commands (' + allBashCmds.length + ')</summary><div class="stats-detail-list">';
      for (const cmd of allBashCmds.slice(0, 150)) {
        const errCls = cmd.is_error ? ' style="border-left-color:var(--red)"' : '';
        html += `<div class="stats-detail-item"${errCls}><div class="stats-detail-item-header"><span class="stats-detail-meta">turn ${cmd.turn} \u00B7 ${cmd.session}${cmd.description ? ' \u00B7 ' + escapeHtml(cmd.description) : ''}</span>${copyBtn(cmd.command)}</div><code>${escapeHtml(cmd.command)}</code></div>`;
      }
      if (allBashCmds.length > 150) html += '<div class="md-empty">...and ' + (allBashCmds.length - 150) + ' more</div>';
      html += '</div></details>';
    }

    // Files read
    const sortedReads = Object.entries(allFilesRead).sort((a, b) => b[1] - a[1]);
    if (sortedReads.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Files Read (' + sortedReads.length + ' unique)</summary><div class="stats-detail-list">';
      for (const [path, count] of sortedReads.slice(0, 50)) {
        html += `<div class="stats-detail-item"><code>${escapeHtml(path)}</code><span class="stats-detail-meta">${count}x</span></div>`;
      }
      html += '</div></details>';
    }

    // Files edited
    const sortedEdits = Object.entries(allFilesEdited).sort((a, b) => b[1].count - a[1].count);
    if (sortedEdits.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Files Edited (' + sortedEdits.length + ' unique)</summary><div class="stats-detail-list">';
      for (const [path, info] of sortedEdits.slice(0, 50)) {
        html += `<div class="stats-detail-item"><code>${escapeHtml(path)}</code><span class="stats-detail-meta">${info.count}x ${info.tool}</span></div>`;
      }
      html += '</div></details>';
    }

    // Agents
    if (allAgents.length > 0) {
      html += '<details class="stats-detail"><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Agents (' + allAgents.length + ')</summary><div class="stats-detail-list">';
      for (const a of allAgents) {
        const badges = [];
        if (a.subagent_type) badges.push(a.subagent_type);
        if (a.mode) badges.push('mode: ' + a.mode);
        if (a.model) badges.push('model: ' + a.model);
        if (a.run_in_background) badges.push('background');
        const agentFullText = `Agent(description="${a.description}", subagent_type="${a.subagent_type}", mode="${a.mode}"${a.model ? ', model="' + a.model + '"' : ''}${a.run_in_background ? ', run_in_background=true' : ''})\n\nPrompt:\n${a.prompt}`;
        html += `<div class="stats-detail-item">
          <div class="stats-detail-item-header">
            <strong>${escapeHtml(a.description || "Agent")}</strong>
            ${badges.map(b => '<span class="stats-agent-badge">' + escapeHtml(b) + '</span>').join(' ')}
            ${copyBtn(agentFullText)}
          </div>
          ${a.prompt ? '<div class="stats-detail-prompt">' + escapeHtml(a.prompt) + '</div>' : ''}
          <span class="stats-detail-meta">turn ${a.turn} \u00B7 ${a.session}</span>
        </div>`;
      }
      html += '</div></details>';
    }

    // Teams
    if (allTeams.length > 0) {
      html += '<details class="stats-detail" open><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Teams (' + allTeams.length + ')</summary><div class="stats-detail-list">';
      for (const t of allTeams) {
        const inp = t.input || {};
        html += `<div class="stats-detail-item" style="border-left-color:${t.action === 'TeamCreate' ? 'var(--green)' : 'var(--red)'}">
          <div class="stats-detail-item-header"><strong>${escapeHtml(t.action)}</strong>${copyBtn(JSON.stringify(inp, null, 2))}</div>
          <div class="stats-detail-prompt">${escapeHtml(JSON.stringify(inp, null, 2))}</div>
          <span class="stats-detail-meta">turn ${t.turn} \u00B7 ${t.session}</span>
        </div>`;
      }
      html += '</div></details>';
    }

    if (sessions.length > 20) {
      html += '<div class="md-empty" style="margin-top:16px">Stats computed from first 20 of ' + sessions.length + ' sessions</div>';
    }

    statsEl.innerHTML = html;
  }

  async function loadProjectPlans(sessions) {
    const plansEl = document.getElementById("tab-plans");
    plansEl.innerHTML = '<div class="loading"><div class="spinner"></div> Scanning sessions for plans...</div>';

    const toLoad = sessions.slice(0, 20);
    const results = await Promise.all(toLoad.map((s) =>
      api("/api/session-stats", { path: s.path }).then(r => ({ ...r, _session: s })).catch(() => null)
    ));

    const allPlans = [];
    for (const r of results) {
      if (!r || !r.plans || r.plans.length === 0) continue;
      const sid = r._session.sessionId.slice(0, 8);
      const date = r._session.date;
      for (const p of r.plans) {
        allPlans.push({ ...p, session: sid, date });
      }
    }

    if (allPlans.length === 0) {
      plansEl.innerHTML = '<div class="md-empty">No plans found in this project\'s sessions.</div>';
      return;
    }

    let html = '<div class="stats-section-title">Plans (' + allPlans.length + ' entries)</div>';
    for (const p of allPlans) {
      if (p.content) {
        html += `<div class="plan-card">
          <div class="plan-card-header">
            <span class="session-id">${escapeHtml(p.session)}</span>
            <span class="stats-detail-meta">turn ${p.turn}${p.date ? ' \u00B7 ' + formatDate(p.date) : ''}</span>
            <div style="margin-left:auto;display:flex;gap:6px">
              ${p.path ? '<button class="btn btn-small btn-open-plan" data-path="' + escapeHtml(p.path) + '" title="Open in Finder">\uD83D\uDCC1</button>' : ''}
              ${copyBtn(p.content, '\uD83D\uDCCB Copy')}
            </div>
          </div>
          ${p.path ? '<div class="plan-card-path"><code>' + escapeHtml(p.path) + '</code></div>' : ''}
          <div class="md-display" style="max-height:none;font-size:12px;margin-top:8px">${escapeHtml(p.content)}</div>
        </div>`;
      } else {
        html += `<div class="plan-card">
          <div class="plan-card-header">
            <span class="session-id">${escapeHtml(p.session)}</span>
            <span class="stats-detail-meta">${escapeHtml(p.tool)} \u00B7 turn ${p.turn}</span>
          </div>
        </div>`;
      }
    }

    plansEl.innerHTML = html;

    // Wire open-in-finder for plan files
    for (const btn of plansEl.querySelectorAll(".btn-open-plan")) {
      btn.addEventListener("click", () => {
        const dir = btn.dataset.path.split("/").slice(0, -1).join("/");
        api("/api/open", { path: dir, action: "finder" });
        toast("Opened plan folder in Finder");
      });
    }
  }

  async function loadGitTab(projectPath) {
    const gitEl = document.getElementById("tab-git");
    if (!gitEl) return;
    gitEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading git details...</div>';

    const git = await api("/api/git-details", { path: projectPath }).catch(() => null);
    if (!git || !git.isRepo) {
      gitEl.innerHTML = '<div class="md-empty">Not a git repository.</div>';
      return;
    }

    let html = '';

    // Overview cards
    html += `<div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-label">Current Branch</div>
        <div class="stats-card-value" style="font-size:16px">\u2387 ${escapeHtml(git.branch)}</div>
        <div class="stats-card-sub">${git.status?.clean ? '\u2713 clean working tree' : git.status?.total + ' uncommitted changes'}</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Commits</div>
        <div class="stats-card-value">${git.commitCount.toLocaleString()}</div>
        <div class="stats-card-sub">on current branch</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Branches</div>
        <div class="stats-card-value">${git.localBranchCount}</div>
        <div class="stats-card-sub">${git.remoteBranchCount} remote</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Remotes</div>
        <div class="stats-card-value">${git.remotes.length}</div>
        <div class="stats-card-sub">${git.remotes.map(r => escapeHtml(r.name)).join(", ") || "none"}</div>
      </div>
    </div>`;

    // Remotes detail
    if (git.remotes.length > 0) {
      html += '<div class="stats-section-title" style="margin-top:20px">Remotes</div>';
      for (const r of git.remotes) {
        html += `<div class="stats-detail-item"><strong>${escapeHtml(r.name)}</strong> <code>${escapeHtml(r.url)}</code></div>`;
      }
    }

    // Branches
    if (git.localBranches.length > 0) {
      html += '<details class="stats-detail" open><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Local Branches (' + git.localBranches.length + ')</summary>';
      html += '<div class="stats-detail-list">';
      for (const b of git.localBranches) {
        const isCurrent = b === git.branch;
        html += `<div class="stats-detail-item"${isCurrent ? ' style="border-left-color:var(--accent)"' : ''}>
          ${isCurrent ? '<strong>' : ''}${escapeHtml(b)}${isCurrent ? ' \u2190 current</strong>' : ''}
        </div>`;
      }
      html += '</div></details>';
    }

    // Recent commits
    if (git.recentCommits.length > 0) {
      html += '<details class="stats-detail" open><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Recent Commits (' + Math.min(30, git.commitCount) + ' of ' + git.commitCount + ')</summary>';
      html += '<div class="stats-detail-list">';
      for (const c of git.recentCommits) {
        html += `<div class="stats-detail-item"><span class="git-hash">${escapeHtml(c.hash)}</span> ${escapeHtml(c.message)}</div>`;
      }
      html += '</div></details>';
    }

    // Git graph
    if (git.graph) {
      html += '<details class="stats-detail" open><summary class="stats-section-title" style="cursor:pointer;margin-top:20px">Git Graph</summary>';
      html += '<pre class="git-graph-pre">' + escapeHtml(git.graph) + '</pre></details>';
    }

    gitEl.innerHTML = html;
  }

  let currentSortKey = "date";
  let currentSortAsc = false;

  function renderSessionTable(sessions) {
    if (sessions.length === 0) {
      return '<div class="md-empty">No sessions found in this project.</div>';
    }
    // Sort
    const sorted = [...sessions];
    sorted.sort((a, b) => {
      let va, vb;
      if (currentSortKey === "date") { va = a.date || ""; vb = b.date || ""; }
      else if (currentSortKey === "turns") { va = a.turnCount || 0; vb = b.turnCount || 0; }
      else if (currentSortKey === "size") { va = a.size || 0; vb = b.size || 0; }
      else { va = a.date || ""; vb = b.date || ""; }
      if (va < vb) return currentSortAsc ? -1 : 1;
      if (va > vb) return currentSortAsc ? 1 : -1;
      return 0;
    });

    function sortArrow(key) {
      const active = currentSortKey === key;
      const arrow = active ? (currentSortAsc ? "\u25B2" : "\u25BC") : "\u25BC";
      return `<span class="sort-arrow">${arrow}</span>`;
    }
    function sortCls(key) {
      return `sortable${currentSortKey === key ? " sort-active" : ""}`;
    }

    return `
      <div class="session-table-wrap">
      <table class="session-table" id="sessionTable">
        <thead><tr>
          <th>Session</th>
          <th>Preview</th>
          <th class="${sortCls("date")}" data-sort="date">Date ${sortArrow("date")}</th>
          <th class="${sortCls("turns")}" data-sort="turns">Turns ${sortArrow("turns")}</th>
          <th class="${sortCls("size")}" data-sort="size">Size ${sortArrow("size")}</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>
          ${sorted.map((s) => {
            const origIdx = sessions.indexOf(s);
            return `
            <tr data-session-idx="${origIdx}">
              <td><span class="session-id">${escapeHtml(s.sessionId.slice(0, 8))}</span></td>
              <td><span class="session-preview" title="${escapeHtml(s.preview)}">${escapeHtml(s.preview || "(empty)")}</span></td>
              <td><span class="session-date" title="${formatFullDate(s.date)}">${formatDate(s.date)}</span></td>
              <td class="session-turns">${s.turnCount || "\u2014"}</td>
              <td class="session-size">${formatSize(s.size)}</td>
              <td class="session-actions">
                <button class="btn btn-primary btn-replay" data-idx="${origIdx}" title="Open replay">Replay</button>
                <button class="btn btn-transcript" data-idx="${origIdx}" title="View full transcript">Transcript</button>
                <button class="btn btn-edit" data-idx="${origIdx}" title="Open in editor">Edit</button>
                <button class="btn btn-export-md" data-idx="${origIdx}" title="Export Markdown">MD</button>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
      </div>
    `;
  }

  // Sorting handler (delegated after render)
  detailEl.addEventListener("click", (e) => {
    const th = e.target.closest("th.sortable");
    if (!th) return;
    const key = th.dataset.sort;
    if (currentSortKey === key) {
      currentSortAsc = !currentSortAsc;
    } else {
      currentSortKey = key;
      currentSortAsc = key === "date" ? false : true; // date desc by default, others asc
    }
    // Re-render table
    if (activeDetails) {
      const sessionsEl = document.getElementById("tab-sessions");
      sessionsEl.innerHTML = renderSessionTable(activeDetails.sessions);
      wireSessionActions(activeDetails.sessions);
    }
  });

  function wireSessionActions(sessions) {
    for (const btn of detailEl.querySelectorAll(".btn-replay")) {
      btn.addEventListener("click", () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        const url = "/replay?path=" + encodeURIComponent(s.path) + "&id=" + encodeURIComponent(s.sessionId.slice(0, 8));
        window.open(url, "_blank");
      });
    }

    for (const btn of detailEl.querySelectorAll(".btn-edit")) {
      btn.addEventListener("click", () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        window.open("/editor#path=" + encodeURIComponent(s.path), "_blank");
      });
    }

    for (const btn of detailEl.querySelectorAll(".btn-export-md")) {
      btn.addEventListener("click", async () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        btn.textContent = "...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/export-md", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: s.path, title: s.sessionId.slice(0, 8) }),
          });
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = s.sessionId.slice(0, 8) + ".md";
          a.click();
          URL.revokeObjectURL(url);
          toast("Markdown exported");
        } catch (e) { toast("Export failed: " + e.message, "error"); }
        btn.textContent = "MD";
        btn.disabled = false;
      });
    }
    // Transcript button
    for (const btn of detailEl.querySelectorAll(".btn-transcript")) {
      btn.addEventListener("click", async () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        btn.textContent = "...";
        btn.disabled = true;
        try {
          const data = await api("/api/transcript", { path: s.path });
          openTranscript(s.sessionId.slice(0, 8), data.turns);
        } catch (e) { toast("Failed to load: " + e.message, "error"); }
        btn.textContent = "Transcript";
        btn.disabled = false;
      });
    }
  }

  // ─── Transcript Viewer ───

  const transcriptOverlay = document.getElementById("transcriptOverlay");
  const transcriptBody = document.getElementById("transcriptBody");
  const transcriptSearch = document.getElementById("transcriptSearch");
  const transcriptSearchCount = document.getElementById("transcriptSearchCount");
  const transcriptTitle = document.getElementById("transcriptTitle");
  const transcriptMeta = document.getElementById("transcriptMeta");

  let searchMatches = [];
  let searchCurrentIdx = -1;
  let transcriptTurns = null;

  // Filters
  const filters = { user: true, assistant: true, tools: true, thinking: true };
  for (const key of ["user", "assistant", "tools", "thinking"]) {
    const btn = document.getElementById("filter" + key.charAt(0).toUpperCase() + key.slice(1));
    btn.addEventListener("click", () => {
      filters[key] = !filters[key];
      btn.classList.toggle("active", filters[key]);
      applyFilters();
      if (transcriptSearch.value.trim()) doSearch();
    });
  }

  function applyFilters() {
    for (const el of transcriptBody.querySelectorAll("[data-block-type]")) {
      const type = el.dataset.blockType;
      el.style.display = filters[type] ? "" : "none";
    }
  }

  function toolPreviewText(tc) {
    const inp = tc.input || {};
    if (tc.name === "Bash") return inp.command ? truncateStr(inp.command, 200) : "";
    if (tc.name === "Read") return inp.file_path || "";
    if (tc.name === "Edit") return (inp.file_path || "") + (inp.old_string ? " (edit)" : "");
    if (tc.name === "Write") return (inp.file_path || "") + " (write)";
    if (tc.name === "Grep" || tc.name === "Glob") return (inp.pattern || "") + (inp.path ? " in " + inp.path : "");
    if (tc.name === "Agent") return (inp.description || "") + (inp.subagent_type ? " [" + inp.subagent_type + "]" : "");
    return truncateStr(JSON.stringify(inp), 120);
  }

  function renderToolBlock(tc) {
    const inp = tc.input || {};
    const name = tc.name || "tool";
    let html = '<div class="transcript-tool">';
    html += '<span class="transcript-tool-name">' + escapeHtml(name) + '</span> ';

    if (name === "Bash" && inp.command) {
      html += '<code class="transcript-tool-preview">' + escapeHtml(inp.command) + '</code>';
    } else if ((name === "Read" || name === "Edit" || name === "Write") && inp.file_path) {
      html += '<span class="transcript-tool-preview">' + escapeHtml(inp.file_path) + '</span>';
    } else if (name === "Agent") {
      html += '<span class="transcript-tool-preview">' + escapeHtml(inp.description || "") + '</span>';
      if (inp.prompt) {
        html += '<div class="transcript-tool-prompt">' + escapeHtml(truncateStr(inp.prompt, 500)) + '</div>';
      }
    } else {
      html += '<span class="transcript-tool-preview">' + escapeHtml(toolPreviewText(tc)) + '</span>';
    }

    if (tc.result) {
      const cls = tc.is_error ? ' style="color:var(--red)"' : '';
      html += '<div class="transcript-tool-result"' + cls + '>' + escapeHtml(truncateStr(tc.result, 500)) + '</div>';
    }
    html += '</div>';
    return html;
  }

  function openTranscript(title, turns) {
    transcriptTurns = turns;
    transcriptTitle.textContent = title;
    transcriptMeta.textContent = turns.length + " turns";
    transcriptSearch.value = "";
    transcriptSearchCount.textContent = "";
    searchMatches = [];
    searchCurrentIdx = -1;

    let html = "";
    for (const turn of turns) {
      html += '<div class="transcript-turn">';
      html += '<div class="transcript-turn-header"><span class="transcript-turn-num">#' + turn.index + '</span>' + (turn.timestamp ? turn.timestamp : '') + '</div>';

      if (turn.user_text) {
        html += '<div data-block-type="user"><div class="transcript-role-label user">User</div><div class="transcript-user">' + escapeHtml(turn.user_text) + '</div></div>';
      }

      if (turn.system_events && turn.system_events.length) {
        for (const ev of turn.system_events) {
          html += '<div class="transcript-system-event" data-block-type="tools">' + escapeHtml(ev) + '</div>';
        }
      }

      const blocks = turn.blocks || [];
      if (blocks.length > 0) {
        let hasAssistant = false;
        for (const block of blocks) {
          if (block.kind === "text" && block.text) {
            if (!hasAssistant) {
              html += '<div data-block-type="assistant"><div class="transcript-role-label assistant">Assistant</div>';
              hasAssistant = true;
            }
            html += '<div class="transcript-assistant">' + escapeHtml(block.text) + '</div>';
          } else if (block.kind === "thinking" && block.text) {
            if (hasAssistant) { html += '</div>'; hasAssistant = false; }
            html += '<div data-block-type="thinking"><div class="transcript-thinking">' + escapeHtml(block.text) + '</div></div>';
          } else if (block.kind === "tool_use" && block.tool_call) {
            if (hasAssistant) { html += '</div>'; hasAssistant = false; }
            html += '<div data-block-type="tools">' + renderToolBlock(block.tool_call) + '</div>';
          }
        }
        if (hasAssistant) html += '</div>';
      }
      html += '</div>';
    }

    transcriptBody.innerHTML = html;
    applyFilters();
    transcriptOverlay.classList.add("open");
    setTimeout(() => transcriptSearch.focus(), 100);
  }

  function truncateStr(s, max) {
    return s.length > max ? s.slice(0, max) + "..." : s;
  }

  function doSearch() {
    const query = transcriptSearch.value.trim();
    // Clear old highlights
    for (const m of transcriptBody.querySelectorAll("mark.search-highlight")) {
      m.replaceWith(m.textContent);
    }
    transcriptBody.normalize();
    searchMatches = [];
    searchCurrentIdx = -1;

    if (!query) {
      transcriptSearchCount.textContent = "";
      document.getElementById("searchPrev").disabled = true;
      document.getElementById("searchNext").disabled = true;
      return;
    }

    // Walk visible text nodes and wrap matches
    const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "gi");
    const walker = document.createTreeWalker(transcriptBody, NodeFilter.SHOW_TEXT, {
      acceptNode: (node) => {
        // Skip hidden blocks
        const blockEl = node.parentElement.closest("[data-block-type]");
        if (blockEl && blockEl.style.display === "none") return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    for (const node of textNodes) {
      const text = node.textContent;
      if (!regex.test(text)) continue;
      regex.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let lastIdx = 0;
      let match;
      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIdx) {
          frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
        }
        const mark = document.createElement("mark");
        mark.className = "search-highlight";
        mark.textContent = match[0];
        frag.appendChild(mark);
        lastIdx = regex.lastIndex;
      }
      if (lastIdx < text.length) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx)));
      }
      node.parentNode.replaceChild(frag, node);
    }

    searchMatches = Array.from(transcriptBody.querySelectorAll("mark.search-highlight"));
    const hasMatches = searchMatches.length > 0;
    document.getElementById("searchPrev").disabled = !hasMatches;
    document.getElementById("searchNext").disabled = !hasMatches;

    if (hasMatches) {
      searchCurrentIdx = 0;
      highlightCurrent();
    } else {
      transcriptSearchCount.textContent = "0 results";
    }
  }

  function highlightCurrent() {
    for (const m of searchMatches) m.classList.remove("active");
    if (searchCurrentIdx >= 0 && searchCurrentIdx < searchMatches.length) {
      const el = searchMatches[searchCurrentIdx];
      el.classList.add("active");
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      transcriptSearchCount.textContent = (searchCurrentIdx + 1) + " / " + searchMatches.length;
    }
  }

  function searchNext() {
    if (searchMatches.length === 0) return;
    searchCurrentIdx = (searchCurrentIdx + 1) % searchMatches.length;
    highlightCurrent();
  }

  function searchPrev() {
    if (searchMatches.length === 0) return;
    searchCurrentIdx = (searchCurrentIdx - 1 + searchMatches.length) % searchMatches.length;
    highlightCurrent();
  }

  let searchDebounce = null;
  transcriptSearch.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(doSearch, 200);
  });
  transcriptSearch.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.shiftKey ? searchPrev() : searchNext(); e.preventDefault(); }
    if (e.key === "Escape") { transcriptOverlay.classList.remove("open"); }
  });
  document.getElementById("searchNext").addEventListener("click", searchNext);
  document.getElementById("searchPrev").addEventListener("click", searchPrev);
  document.getElementById("transcriptClose").addEventListener("click", () => {
    transcriptOverlay.classList.remove("open");
  });

  // ─── Keyboard shortcuts ───

  document.addEventListener("keydown", (e) => {
    if (transcriptOverlay.classList.contains("open") && e.key === "Escape") {
      transcriptOverlay.classList.remove("open");
      return;
    }
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "?") { helpModal.classList.toggle("open"); return; }
    if (e.key === "Escape") { helpModal.classList.remove("open"); return; }
    if (e.key === "1") { window.location.href = "/"; return; }
    if (e.key === "2") { window.location.href = "/editor"; return; }
  });

  helpModal.addEventListener("click", (e) => {
    if (e.target === helpModal) helpModal.classList.remove("open");
  });

  document.getElementById("helpBtn").addEventListener("click", () => {
    helpModal.classList.toggle("open");
  });

  // ─── Init ───
  initThemeSwitcher();
  loadProjects();
})();
</script>
</body>
</html>
