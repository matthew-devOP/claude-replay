<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%23bb9af7' stroke-width='2'/><polygon points='12,8 12,24 24,16' fill='%23bb9af7'/></svg>">
<title>claude-replay</title>
<style>
:root {
  --bg: #1a1b26;
  --bg-surface: #24253a;
  --bg-hover: #2f3147;
  --text: #c0caf5;
  --text-dim: #565f89;
  --text-bright: #e0e6ff;
  --accent: #bb9af7;
  --accent-dim: #7957a8;
  --green: #9ece6a;
  --blue: #7aa2f7;
  --orange: #ff9e64;
  --red: #f7768e;
  --cyan: #7dcfff;
  --border: #3b3d57;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* Header */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 16px;
  color: var(--text-bright);
}
.header-logo svg { flex-shrink: 0; }
.header-nav {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.header-nav a {
  color: var(--text-dim);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  transition: background 0.15s, color 0.15s;
}
.header-nav a:hover { color: var(--text); background: var(--bg-hover); }
.header-nav a.active { color: var(--accent); background: var(--accent-dim); background: rgba(187, 154, 247, 0.15); }

/* Sidebar — project list */
.sidebar {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--bg);
}
.sidebar-section {
  padding: 16px;
}
.sidebar-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 10px;
}
.project-card {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.project-card:hover { background: var(--bg-hover); }
.project-card.active { background: var(--bg-surface); border: 1px solid var(--border); }
.project-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 2px;
  word-break: break-word;
}
.project-meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 10px;
}
.project-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

/* Main content */
.main {
  overflow-y: auto;
  padding: 24px 32px;
}

/* Welcome state */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  height: 100%;
  color: var(--text-dim);
  text-align: center;
}
.welcome h2 { color: var(--text); font-size: 20px; }
.welcome p { max-width: 400px; font-size: 14px; line-height: 1.6; }

/* Project detail view */
.detail-header {
  margin-bottom: 24px;
}
.detail-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 4px;
  word-break: break-word;
}
.detail-path {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

/* Tabs for CLAUDE.md / MEMORY.md / Sessions */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Markdown display */
.md-display {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  font-size: 13px;
  line-height: 1.7;
  max-height: 500px;
  overflow-y: auto;
  white-space: pre-wrap;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  color: var(--text);
}
.md-empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 20px;
  text-align: center;
}

/* Session list */
.session-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.session-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 700;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
}
.session-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.session-table tr:hover td { background: var(--bg-surface); }
.session-id {
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--cyan);
}
.session-preview {
  color: var(--text);
  max-width: 350px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-date {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}
.session-turns {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
}
.session-actions {
  display: flex;
  gap: 6px;
  white-space: nowrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-hover);
  color: var(--text);
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit;
}
.btn:hover { border-color: var(--accent); background: var(--bg-surface); }
.btn-primary {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--text-bright);
}
.btn-primary:hover { background: var(--accent); color: #fff; }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px;
  color: var(--text-dim);
  font-size: 13px;
}
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar.mobile-show { display: block; position: fixed; inset: 0; z-index: 100; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-logo">
      <svg width="24" height="24" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#bb9af7" stroke-width="2"/><polygon points="12,8 12,24 24,16" fill="#bb9af7"/></svg>
      claude-replay
    </div>
    <div class="header-nav">
      <a href="/" class="active">Projects</a>
      <a href="/editor">Editor</a>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Projects</div>
      <div id="project-list"><div class="loading"><div class="spinner"></div> Loading projects...</div></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <svg width="48" height="48" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#bb9af7" stroke-width="1.5"/><polygon points="12,8 12,24 24,16" fill="#bb9af7"/></svg>
      <h2>Welcome to claude-replay</h2>
      <p>Select a project from the sidebar to browse sessions, view CLAUDE.md, and export conversations.</p>
    </div>
    <div id="detail" style="display:none"></div>
  </div>
</div>

<script>
(function() {
  "use strict";

  const projectListEl = document.getElementById("project-list");
  const mainEl = document.getElementById("main");
  const welcomeEl = document.getElementById("welcome");
  const detailEl = document.getElementById("detail");

  let projects = [];
  let activeProject = null;

  // ─── Helpers ───

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return "just now";
    if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
    if (diff < 604800000) return Math.floor(diff / 86400000) + "d ago";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: d.getFullYear() !== now.getFullYear() ? "numeric" : undefined });
  }

  function formatFullDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });
  }

  function formatSize(bytes) {
    if (!bytes) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  async function api(path, body) {
    const opts = body ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) } : {};
    const res = await fetch(path, opts);
    return res.json();
  }

  // ─── Project list ───

  async function loadProjects() {
    projects = await api("/api/projects");
    renderProjectList();
  }

  function renderProjectList() {
    if (projects.length === 0) {
      projectListEl.innerHTML = '<div class="md-empty">No projects found.<br>Start a Claude Code session to see projects here.</div>';
      return;
    }
    projectListEl.innerHTML = projects.map((p, i) => `
      <div class="project-card" data-idx="${i}">
        <div class="project-name">${escapeHtml(p.name)}</div>
        <div class="project-meta">
          <span class="project-badge">${p.sessionCount} session${p.sessionCount !== 1 ? "s" : ""}</span>
          <span class="project-badge">${formatDate(p.lastActivity)}</span>
        </div>
      </div>
    `).join("");

    projectListEl.addEventListener("click", (e) => {
      const card = e.target.closest(".project-card");
      if (!card) return;
      const idx = parseInt(card.dataset.idx);
      selectProject(projects[idx]);
      // Update active state
      for (const c of projectListEl.querySelectorAll(".project-card")) c.classList.remove("active");
      card.classList.add("active");
    });
  }

  // ─── Project detail ───

  async function selectProject(project) {
    activeProject = project;
    welcomeEl.style.display = "none";
    detailEl.style.display = "block";
    detailEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading project details...</div>';

    const details = await api("/api/projects/details", { source: project.source, dirName: project.dirName });

    let html = `
      <div class="detail-header">
        <div class="detail-title">${escapeHtml(details.name)}</div>
        <div class="detail-path">${escapeHtml(details.claudeProjectPath)}</div>
      </div>
      <div class="tabs" id="tabs">
        <div class="tab active" data-tab="sessions">Sessions (${details.sessions.length})</div>
        ${details.claudeMd ? '<div class="tab" data-tab="claude-md">CLAUDE.md</div>' : ""}
        ${details.memoryMd ? '<div class="tab" data-tab="memory-md">MEMORY.md</div>' : ""}
      </div>
      <div class="tab-content active" id="tab-sessions">${renderSessionTable(details.sessions)}</div>
    `;

    if (details.claudeMd) {
      html += `<div class="tab-content" id="tab-claude-md"><div class="md-display">${escapeHtml(details.claudeMd)}</div></div>`;
    }
    if (details.memoryMd) {
      html += `<div class="tab-content" id="tab-memory-md"><div class="md-display">${escapeHtml(details.memoryMd)}</div></div>`;
    }

    detailEl.innerHTML = html;

    // Tab switching
    const tabs = detailEl.querySelectorAll(".tab");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        detailEl.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        tab.classList.add("active");
        const target = document.getElementById("tab-" + tab.dataset.tab);
        if (target) target.classList.add("active");
      });
    });

    // Wire action buttons
    wireSessionActions(details.sessions);
  }

  function renderSessionTable(sessions) {
    if (sessions.length === 0) {
      return '<div class="md-empty">No sessions found in this project.</div>';
    }
    return `
      <table class="session-table">
        <thead><tr>
          <th>Session</th>
          <th>Preview</th>
          <th>Date</th>
          <th>Turns</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>
          ${sessions.map((s, i) => `
            <tr data-session-idx="${i}">
              <td><span class="session-id">${escapeHtml(s.sessionId.slice(0, 8))}</span></td>
              <td><span class="session-preview" title="${escapeHtml(s.preview)}">${escapeHtml(s.preview || "(empty)")}</span></td>
              <td><span class="session-date" title="${formatFullDate(s.date)}">${formatDate(s.date)}</span></td>
              <td class="session-turns">${s.turnCount || "—"}</td>
              <td class="session-actions">
                <button class="btn btn-primary btn-replay" data-idx="${i}" title="Open in replay viewer">Replay</button>
                <button class="btn btn-edit" data-idx="${i}" title="Open in editor">Edit</button>
                <button class="btn btn-export-md" data-idx="${i}" title="Export as Markdown">MD</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  function wireSessionActions(sessions) {
    // Replay button — generate HTML and open in new tab
    for (const btn of detailEl.querySelectorAll(".btn-replay")) {
      btn.addEventListener("click", async () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        btn.textContent = "...";
        btn.disabled = true;
        try {
          // Load, then export as HTML to open
          const loadRes = await api("/api/load", { path: s.path });
          const exportRes = await fetch("/api/export", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: loadRes.sessionId, options: { title: s.sessionId.slice(0, 8) } }),
          });
          const blob = await exportRes.blob();
          const url = URL.createObjectURL(blob);
          window.open(url, "_blank");
        } catch (e) { alert("Export failed: " + e.message); }
        btn.textContent = "Replay";
        btn.disabled = false;
      });
    }

    // Edit button — open in editor with the session path
    for (const btn of detailEl.querySelectorAll(".btn-edit")) {
      btn.addEventListener("click", () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        window.open("/editor#path=" + encodeURIComponent(s.path), "_blank");
      });
    }

    // Markdown export
    for (const btn of detailEl.querySelectorAll(".btn-export-md")) {
      btn.addEventListener("click", async () => {
        const s = sessions[parseInt(btn.dataset.idx)];
        btn.textContent = "...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/export-md", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: s.path, title: s.sessionId.slice(0, 8) }),
          });
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = s.sessionId.slice(0, 8) + ".md";
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) { alert("Export failed: " + e.message); }
        btn.textContent = "MD";
        btn.disabled = false;
      });
    }
  }

  // ─── Init ───
  loadProjects();
})();
</script>
</body>
</html>
