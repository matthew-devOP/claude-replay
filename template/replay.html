<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%23bb9af7' stroke-width='2'/><polygon points='12,8 12,24 24,16' fill='%23bb9af7'/></svg>">
<title>claude-replay</title>
<style>/*SHARED_CSS*/</style>
<style>
.app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}
.replay-frame {
  width: 100%;
  height: 100%;
  border: none;
  background: var(--bg);
}
.replay-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
}
.replay-error {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--red);
  font-size: 14px;
}
/* Theme dropdown styles in shared.css */
</style>
</head>
<body>
<script>
  try {
    const saved = localStorage.getItem("claude-replay-theme");
    if (saved) {
      const data = JSON.parse('/*THEMES_JSON*/');
      const vars = data.themes[saved];
      if (vars) {
        for (const [k, v] of Object.entries(vars))
          document.documentElement.style.setProperty("--" + k, v);
      }
    }
  } catch {}
</script>
<div class="app">
  <header class="app-header">
    <a href="/" class="app-logo">
      <svg width="22" height="22" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)"/><polygon points="12,8 12,24 24,16" fill="currentColor" style="color:var(--accent)"/></svg>
      claude-replay
      <span class="app-version" id="appVersion"></span>
    </a>
    <nav class="app-nav">
      <a href="/">Projects</a>
      <a href="/editor">Editor</a>
      <a href="/docs">Docs</a>
    </nav>
    <div class="app-header-right">
      <div class="theme-dropdown" id="themeDropdown">
        <button class="theme-dropdown-btn" id="themeDropdownBtn">
          <span class="theme-dot-mini" id="themeDotPreview"></span>
          <span id="themeNameLabel">Theme</span>
          <span style="font-size:8px">\u25BC</span>
        </button>
        <div class="theme-dropdown-menu" id="themeDropdownMenu"></div>
      </div>
    </div>
  </header>
  <div id="replayContainer">
    <div class="replay-loading"><div class="spinner"></div> Loading replay...</div>
  </div>
  <footer class="app-footer">
    <div class="footer-left" id="footerLeft"></div>
    <div class="footer-right" id="footerRight"></div>
  </footer>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
(function() {
  "use strict";
  const THEME_DATA = JSON.parse('/*THEMES_JSON*/');
  const container = document.getElementById("replayContainer");
  const footerLeft = document.getElementById("footerLeft");
  const footerRight = document.getElementById("footerRight");

  footerRight.innerHTML = '<a href="/docs" style="color:var(--text-dim);text-decoration:none;">Docs</a><span style="margin:0 8px;color:var(--border);">\u00B7</span>claude-replay v' + THEME_DATA.version;
  document.getElementById("appVersion").textContent = "v" + THEME_DATA.version;

  // Parse URL params
  const params = new URLSearchParams(location.search);
  const sessionPath = params.get("path");
  const sessionId = params.get("id") || "";

  if (!sessionPath) {
    container.innerHTML = '<div class="replay-error">No session path specified. Go back to <a href="/" style="color:var(--accent)">Projects</a>.</div>';
    return;
  }

  // Theme management
  let currentTheme = localStorage.getItem("claude-replay-theme") || "tokyo-night";

  function applyTheme(name) {
    const vars = THEME_DATA.themes[name];
    if (!vars) return;
    currentTheme = name;
    document.body.classList.add("theme-transitioning");
    for (const [k, v] of Object.entries(vars))
      document.documentElement.style.setProperty("--" + k, v);
    localStorage.setItem("claude-replay-theme", name);
    // Update dropdown
    document.querySelectorAll(".theme-dropdown-item").forEach(d =>
      d.classList.toggle("active", d.dataset.theme === name)
    );
    document.getElementById("themeDotPreview").style.background = vars.accent;
    document.getElementById("themeNameLabel").textContent = name;
    requestAnimationFrame(() => setTimeout(() => document.body.classList.remove("theme-transitioning"), 350));
    // Reload replay with new theme
    loadReplay();
  }

  function initThemeDropdown() {
    const menu = document.getElementById("themeDropdownMenu");
    const btn = document.getElementById("themeDropdownBtn");
    const dropdown = document.getElementById("themeDropdown");

    for (const [name, vars] of Object.entries(THEME_DATA.themes)) {
      const item = document.createElement("button");
      item.className = "theme-dropdown-item" + (name === currentTheme ? " active" : "");
      item.dataset.theme = name;
      item.innerHTML = '<span class="theme-dot-mini" style="background:' + vars.accent + '"></span>' + name;
      item.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.classList.remove("open");
        if (name !== currentTheme) applyTheme(name);
      });
      menu.appendChild(item);
    }

    // Set initial preview
    const initVars = THEME_DATA.themes[currentTheme];
    if (initVars) {
      document.getElementById("themeDotPreview").style.background = initVars.accent;
      document.getElementById("themeNameLabel").textContent = currentTheme;
    }

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("open");
    });
    document.addEventListener("click", () => dropdown.classList.remove("open"));
  }

  // Load replay into iframe
  async function loadReplay() {
    container.innerHTML = '<div class="replay-loading"><div class="spinner"></div> Rendering replay...</div>';
    footerLeft.textContent = sessionId ? sessionId + " \u00B7 loading..." : "loading...";

    try {
      const res = await fetch("/api/render-replay", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          path: sessionPath,
          theme: currentTheme,
          title: sessionId || "Replay",
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "HTTP " + res.status);
      }

      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);

      const iframe = document.createElement("iframe");
      iframe.className = "replay-frame";
      iframe.src = blobUrl;
      container.innerHTML = "";
      container.appendChild(iframe);

      const filename = sessionPath.split("/").pop().replace(".jsonl", "");
      footerLeft.textContent = (sessionId || filename) + " \u00B7 " + currentTheme;
    } catch (e) {
      container.innerHTML = '<div class="replay-error">Failed to load: ' + e.message + '</div>';
      footerLeft.textContent = "error";
    }
  }

  // Keyboard: Escape goes back
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") window.location.href = "/";
  });

  initThemeDropdown();
  loadReplay();
})();
</script>
</body>
</html>
