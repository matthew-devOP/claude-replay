<body>
<div class="container">
  <div class="controls">
    <div class="controls-row">
      <button id="btn-prev" title="Previous turn">&larr;</button>
      <button id="btn-play" title="Play / Pause">&#9654;</button>
      <button id="btn-next" title="Next turn">&rarr;</button>
      <a class="bar-title" id="bar-title" title="/*PAGE_TITLE*/">/*PAGE_TITLE*/</a>
      <span class="progress-text" id="progress-text">0 of 0</span>
      <div class="chapter-wrap" id="chapter-wrap" style="display:none">
        <button id="chapter-btn" title="Chapters">&#9776;</button>
        <div class="chapter-menu" id="chapter-menu"></div>
      </div>
      <div class="controls-secondary">
        <div class="speed-wrap" id="speed-wrap">
          <button id="speed-btn" title="Speed">/*INITIAL_SPEED*/x</button>
          <div class="speed-popover" id="speed-popover"></div>
        </div>
        <div class="filter-wrap" id="filter-wrap">
          <button id="filter-btn" title="Filter content"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A.5.5 0 0 1 1.5 2h13a.5.5 0 0 1 .4.8L10 8.7V13.5a.5.5 0 0 1-.7.5l-2.5-1.2a.5.5 0 0 1-.3-.5V8.7L1.1 2.8A.5.5 0 0 1 1 2.5z"/></svg></button>
          <div class="filter-popover">
            <label><input type="checkbox" id="toggle-thinking" /*CHECKED_THINKING*/> Thinking</label>
            <label><input type="checkbox" id="toggle-tools" /*CHECKED_TOOLS*/> Tools</label>
          </div>
        </div>
        <div class="export-wrap" id="export-wrap">
          <button id="export-btn" title="Export"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 10.293V1.5A.5.5 0 0 1 8 1z"/><path d="M2 13.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5z"/></svg></button>
          <div class="export-popover" id="export-popover">
            <button id="export-md-btn">&#128196; Export as Markdown</button>
            <button id="export-pdf-btn">&#128438; Export as PDF</button>
          </div>
        </div>
      </div>
      <div class="more-wrap" id="more-wrap">
        <button id="more-btn" title="More">&#x22EE;</button>
        <div class="more-popover" id="more-popover">
          <div class="more-row">
            <span class="more-row-label">Speed</span>
            <button id="speed-btn2" title="Cycle speed">/*INITIAL_SPEED*/x</button>
          </div>
          <hr class="more-divider">
          <label><input type="checkbox" id="toggle-thinking2" /*CHECKED_THINKING*/> Thinking</label>
          <label><input type="checkbox" id="toggle-tools2" /*CHECKED_TOOLS*/> Tools</label>
