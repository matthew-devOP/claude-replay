name: Claude-MTW-Replay
options:
  bundleIdPrefix: com.claude-replay
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Claude-MTW-Replay:
    type: application
    platform: macOS
    sources:
      - path: Claude-MTW-Replay
        excludes:
          - Tests/**
          - "**/.DS_Store"
          # Sidecar is copied wholesale by the postBuildScripts below;
          # excluded here so xcodegen doesn't fan its node_modules out
          # as individual files (zod's package has duplicate basenames
          # that would clash if flattened into a single Resources dir).
          - Sidecar/**
    resources:
      - path: Claude-MTW-Replay/Resources
        buildPhase: resources
    postBuildScripts:
      - name: Copy sidecar bundle
        # Built by `swift/sidecar/build.sh`. We copy as a real directory
        # tree into Contents/Resources/Sidecar so the runtime path is
        # `Bundle.main.resourceURL!.appendingPathComponent("Sidecar")`.
        script: |
          set -eu
          SRC="${SRCROOT}/Claude-MTW-Replay/Sidecar"
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Sidecar"
          if [ ! -d "$SRC" ]; then
            echo "warning: $SRC missing — run swift/sidecar/build.sh first"
            exit 0
          fi
          mkdir -p "$(dirname "$DEST")"
          rm -rf "$DEST"
          cp -R "$SRC" "$DEST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude-replay.Claude-MTW-Replay
        PRODUCT_NAME: Claude MTW Replay
        INFOPLIST_GENERATION_CLASS: $(PRODUCT_MODULE_NAME).Claude_MTW_ReplayApp
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Claude MTW Replay"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 Claude Replay. All rights reserved."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: Claude-MTW-Replay/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: JSONL Transcript
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.json
            LSHandlerRank: Alternate
        CFBundleURLTypes: []
        LSMinimumSystemVersion: "14.0"
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false

  Claude-MTW-ReplayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Claude-MTW-Replay/Tests
    dependencies:
      - target: Claude-MTW-Replay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude-replay.Claude-MTW-ReplayTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude MTW Replay.app/Contents/MacOS/Claude MTW Replay"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Claude-MTW-Replay:
    build:
      targets:
        Claude-MTW-Replay: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Claude-MTW-ReplayTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
